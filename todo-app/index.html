<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <header class="app-header">
                <h1>📝 My To-Do List</h1>
                <p class="subtitle">Stay organized and productive</p>
            </header>

            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Add</button>
                </div>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="stats">
                <span class="stat">Total: <span id="totalCount">0</span></span>
                <span class="stat">Active: <span id="activeCount">0</span></span>
                <span class="stat">Completed: <span id="completedCount">0</span></span>
            </div>

            <div class="todo-list" id="todoList">
                <div class="empty-state">
                    <p>✨ No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <footer class="app-footer">
                <button id="clearBtn" class="clear-btn">Clear Completed</button>
                <button id="deleteAllBtn" class="delete-all-btn">Delete All</button>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
